services:
  branch_a_db:
    image: postgres:16-alpine
    container_name: bytevault_branch_a
    depends_on:
      branch_b_db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_a
      POSTGRES_PASSWORD: secure_password_a
      POSTGRES_DB: branch_a_db
    ports:
      - "55432:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/custom.conf:/etc/postgresql/custom.conf:ro
      - branch_a_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/custom.conf"]
    networks:
      - bytevault_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_a -d branch_a_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  branch_b_db:
    image: postgres:16-alpine
    container_name: bytevault_branch_b
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin_b
      POSTGRES_PASSWORD: secure_password_b
      POSTGRES_DB: branch_b_db
    ports:
      - "55433:5432"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/custom.conf:/etc/postgresql/custom.conf:ro
      - branch_b_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/custom.conf"]
    networks:
      - bytevault_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_b -d branch_b_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bytevault_backend
    restart: unless-stopped
    depends_on:
      branch_a_db:
        condition: service_healthy
      branch_b_db:
        condition: service_healthy
    environment:
      - BRANCH_A_DB_URL=postgresql://admin_a:secure_password_a@branch_a_db:5432/branch_a_db
      - BRANCH_B_DB_URL=postgresql://admin_b:secure_password_b@branch_b_db:5432/branch_b_db
      - JWT_SECRET=super_secret_dev_key
      - PORT=4000
    ports:
      - "4000:4000"
    networks:
      - bytevault_net

  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000
    container_name: bytevault_client
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - bytevault_net

networks:
  bytevault_net:
    driver: bridge

volumes:
  branch_a_data:
  branch_b_data:
