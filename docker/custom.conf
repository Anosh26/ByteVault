# Required when this file is used as the sole config_file (docker-compose command):
# otherwise Postgres only listens on localhost and other containers cannot connect (FDW fails).
listen_addresses = '*'

# Enforce strict timeouts to prevent deadlocks
statement_timeout = 5000       # Kill any query taking more than 5 seconds
lock_timeout = 3000          # Fail if we can't acquire a row lock in 3 seconds
idle_in_transaction_session_timeout = 10000 # Kill abandoned transactions

# Required for 2PC (PREPARE TRANSACTION / COMMIT PREPARED)
max_prepared_transactions = 100
